[tool.pyright]
typeCheckingMode = "basic"


# PDM example
[tool.pdm]
distribution = true
[tool.pdm.scripts]
isort = "isort acme"
# black = "black acme"
format = { composite = ["isort", "black"] }
check_isort = "isort --check acme tests"
# check_black = "black --check acme tests"
vulture = "vulture --min-confidence 100 acme tests"
ruff = "ruff check acme tests"
fix = "ruff check --fix acme tests"
codespell = "codespell --toml ./pyproject.toml"
lint = { composite = [
    "vulture",
    "codespell",
    "ruff",
    "check_isort",
    "check_black",
] }

[tool.ruff.format]
quote-style = "single"
# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = true

[tool.black]
line-length = 120
skip-string-normalization = true
# enable-unstable-feature = ["whitespace"]
# target-version = ['py310']
# include = '\.pyi?$'
exclude = '''
/(
    __init__\.py
)/
'''
extend-exclude = '''
/(
  # The following are specific to Black, you probably don't want those.
  tests/data
  | profiling
)/
'''


[tool.autoflake]
check = true
in-place = true
recursive = true
expand-star-imports = true
# remove_all_unused_imports = true
remove-all-unused-imports = true
# remove_unused_variables = true


# [tool.flakehell]
# exclude = ["README.rst", "README.md"]
# format = "colored"
# max_line_length = 88
# show_source = true
# whitelist = "../../allowlist.txt"
# # unused_imports = false


# [tool.mypy]
# python_version = "3.8"
# disallow_untyped_defs = true
# exclude = ["src/(app|ingest)", "scripts", "docs"]
# show_error_codes = true
# no_implicit_optional = true
